name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test
        run: cargo test
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  c-conformance:
    name: C conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install C build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake libtool pkg-config liblbfgs-dev
      - name: Build bundled CRFsuite
        id: cbuild
        run: |
          if [ ! -x crfsuite/autogen.sh ]; then
            echo "Bundled crfsuite/ tree is absent; skipping C conformance."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          cd crfsuite
          ./autogen.sh
          ./configure
          make -j"$(nproc)"
          echo "available=true" >> "$GITHUB_OUTPUT"
      - name: Run conformance tests
        if: steps.cbuild.outputs.available == 'true'
        run: cargo test --test conformance
